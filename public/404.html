<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carlton Shi - Redirecting</title>
    <script>
      const base = '/Carlton-Shi-s-Portfolio/'
      const path = window.location.pathname.startsWith(base)
        ? window.location.pathname.slice(base.length)
        : window.location.pathname.replace(/^\/+/, '')
      window.location.replace(`${base}?redirect=${encodeURIComponent(path + window.location.search + window.location.hash)}`)
    </script>
  </head>
  <body>
    Redirecting...
  </body>
</html>
